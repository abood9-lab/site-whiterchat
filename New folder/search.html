<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whiterchat | Explore</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00ff88;
            --bg: #01080b;
            --glass: rgba(15, 30, 35, 0.95);
            --border: rgba(0, 255, 136, 0.2);
            --sidebar-width: 280px;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: white; font-family: -apple-system, system-ui, sans-serif;
            margin: 0; display: flex; min-height: 100vh; overflow-x: hidden;
        }

        /* --- Navigation --- */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(1, 8, 11, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; padding: 0 20px; z-index: 2500; }
        .nav-container { position: fixed; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); z-index: 2000; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .nav-container { 
                bottom: 0; left: 0; width: 100%; height: calc(65px + var(--safe-bottom)); 
                display: flex; justify-content: space-around; align-items: flex-start; 
                padding-top: 10px; border: none; border-top: 1px solid var(--border);
                padding-bottom: var(--safe-bottom);
            }
            .nav-text, .sidebar-logo { display: none; }
            .nav-item { color: white; font-size: 22px; text-decoration: none; }
            .nav-item.active { color: var(--neon); }
            .main-content { margin-top: 70px; width: 100%; padding: 10px; padding-bottom: 100px; }
        }

        @media (min-width: 769px) {
            .nav-container { left: 0; top: 0; height: 100vh; width: var(--sidebar-width); display: flex; flex-direction: column; padding: 30px 20px; gap: 10px; border-right: 1px solid var(--border); }
            .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; border-radius: 15px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.3s; }
            .nav-item.active { background: rgba(0, 255, 136, 0.1); color: var(--neon); }
            .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; display: flex; flex-direction: column; align-items: center; }
            .sidebar-logo { font-size: 30px; font-weight: 900; color: var(--neon); margin-bottom: 40px; font-style: italic; }
        }

        /* --- Search & Grid --- */
        .search-wrapper { width: 100%; max-width: 935px; }
        .search-box { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .search-box input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        
        .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .grid-item { aspect-ratio: 1/1; position: relative; overflow: hidden; cursor: pointer; background: #051014; border-radius: 4px; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: filter 0.2s; }
        .grid-item:hover img { filter: brightness(0.8); }
        .grid-item .overlay-icon { position: absolute; top: 10px; right: 10px; color: white; font-size: 18px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        /* --- Desktop Responsive Post Overlay --- */
        #post-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 3000; display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .desktop-modal {
            background: #000; width: 95%; max-width: 1100px; height: 90vh;
            display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #333;
            position: relative;
        }

        .modal-media { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; position: relative; border-right: 1px solid #222; }
        .modal-side { flex: 0.8; display: flex; flex-direction: column; background: #000; max-width: 400px; }

        @media (max-width: 768px) {
            .desktop-modal { flex-direction: column; height: 100vh; width: 100%; border-radius: 0; }
            .modal-media { flex: none; width: 100%; aspect-ratio: 1/1; }
            .modal-side { flex: 1; max-width: 100%; }
            .close-btn { top: 15px !important; right: 15px !important; background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        }

        /* Elements inside Modal */
        .close-btn { position: absolute; top: -40px; right: -40px; color: white; font-size: 30px; cursor: pointer; z-index: 3100; }
        .user-header { padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        .caption-area { padding: 15px; flex: 1; overflow-y: auto; font-size: 14px; line-height: 1.5; color: #efefef; }
        
        /* Slider inside Modal */
        .image-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; width: 100%; height: 100%; }
        .image-slider::-webkit-scrollbar { display: none; }
        .slider-img { min-width: 100%; width: 100%; object-fit: contain; scroll-snap-align: start; }
        .img-counter { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--neon); object-fit: cover; }
    </style>
</head>
<body>

    <header class="mobile-header">
        <div style="font-size: 22px; font-weight: 900; color: var(--neon); font-style: italic;">Whiterchat</div>
        <div style="display: flex; gap: 20px;">
            <a href='/messages' style='color:white;'><i class="fa-regular fa-paper-plane"></i></a>
        </div>
    </header>

    <nav class="nav-container">
        <div class="sidebar-logo">Whiterchat</div>
        <a class='nav-item' href='/feed'><i class="fa-solid fa-house"></i> <span class="nav-text">Home</span></a>
        <a class='nav-item active' href='/search'><i class="fa-solid fa-magnifying-glass"></i> <span class="nav-text">Explore</span></a>
        <a class='nav-item' href='/create-post'><i class="fa-solid fa-square-plus"></i> <span class="nav-text">Create</span></a>
        <a class='nav-item' href='/reels'><i class="fa-solid fa-clapperboard"></i> <span class="nav-text">Reels</span></a>
        <a class='nav-item' href='/profile'><i class="fa-solid fa-user"></i> <span class="nav-text">Profile</span></a>
    </nav>

    <main class="main-content">
        <div class="search-wrapper">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--neon);"></i>
                <input type="text" id="search-input" placeholder="Search for people..." oninput="searchUsers(this.value)">
            </div>
            <div id="user-results"></div>
            <h3 id="explore-title" style="margin: 0 0 15px 5px; color: var(--neon); font-size: 18px; font-weight: bold;">Explore</h3>
            <div class="explore-grid" id="explore-grid"></div>
        </div>
    </main>

    <div id="post-overlay" onclick="if(event.target == this) closePost()">
        <div class="desktop-modal">
            <i class="fa-solid fa-xmark close-btn" onclick="closePost()"></i>
            
            <div class="modal-media" id="modal-media-cont">
                </div>

            <div class="modal-side">
                <div class="user-header" id="modal-user-header">
                    </div>
                <div class="caption-area" id="modal-caption-area">
                    </div>
                <div style="padding: 15px; border-top: 1px solid #222; font-size: 12px; color: #555;">
                    Whiterchat Post Experience
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, limit, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBkjn1uIjzvmC4suZdA8bfYNO_fx5Hnj0s", authDomain: "comments-5e3b5.firebaseapp.com", projectId: "comments-5e3b5", storageBucket: "comments-5e3b5.firebasestorage.app", messagingSenderId: "907122259758", appId: "1:907122259758:web:7819cab50ebd74dd912cbf" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if (user) loadExploreGrid(); });

        async function loadExploreGrid() {
            const grid = document.getElementById('explore-grid');
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(30));
            const snap = await getDocs(q);
            grid.innerHTML = '';
            snap.forEach(d => {
                const post = d.data();
                const images = Array.isArray(post.images) ? post.images : (post.imageUrl ? [post.imageUrl] : []);
                let html = '';
                if(images.length > 0) {
                    html = `<img src="${images[0]}" loading="lazy"> ${images.length > 1 ? '<i class="fa-solid fa-clone overlay-icon"></i>' : ''}`;
                } else {
                    html = `<div style="height:100%; display:flex; align-items:center; justify-content:center; padding:10px; font-size:11px; text-align:center; color:#555; background:#050a0c;">${post.caption?.substring(0, 50)}...</div>`;
                }
                grid.innerHTML += `<div class="grid-item" onclick="openPost('${d.id}')">${html}</div>`;
            });
        }

        window.openPost = async (id) => {
            const overlay = document.getElementById('post-overlay');
            const mediaCont = document.getElementById('modal-media-cont');
            const userHeader = document.getElementById('modal-user-header');
            const captionArea = document.getElementById('modal-caption-area');

            overlay.style.display = 'flex';
            mediaCont.innerHTML = 'Loading...';

            const d = await getDoc(doc(db, "posts", id));
            if (d.exists()) {
                const p = d.data();
                const images = Array.isArray(p.images) ? p.images : (p.imageUrl ? [p.imageUrl] : []);

                userHeader.innerHTML = `
                    <img src="${p.userPhoto || 'logo.png'}" class="user-avatar">
                    <b style="font-size:14px; cursor:pointer;" onclick="location.href='profile.html?uid=${p.uid}'">${p.username}</b>
                `;

                captionArea.innerHTML = `<b>${p.username}</b> ${p.caption || ''}`;

                if(images.length > 0) {
                    mediaCont.innerHTML = `
                        ${images.length > 1 ? `<div class="img-counter" id="cnt-${id}">1/${images.length}</div>` : ''}
                        <div class="image-slider" onscroll="updateSliderCounter(this, '${id}', ${images.length})">
                            ${images.map(img => `<img src="${img}" class="slider-img">`).join('')}
                        </div>
                    `;
                } else {
                    mediaCont.innerHTML = `<div style="padding:20px; text-align:center; color:#888;">No Media</div>`;
                }
            }
        };

        window.updateSliderCounter = (el, id, total) => {
            const index = Math.round(el.scrollLeft / el.offsetWidth) + 1;
            const counter = document.getElementById(`cnt-${id}`);
            if(counter) counter.innerText = `${index}/${total}`;
        };

        window.closePost = () => { document.getElementById('post-overlay').style.display = 'none'; };

        window.searchUsers = async (val) => {
            const results = document.getElementById('user-results');
            const grid = document.getElementById('explore-grid');
            const title = document.getElementById('explore-title');
            if (!val.trim()) { results.innerHTML = ''; grid.style.display = 'grid'; title.style.display = 'block'; return; }
            const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + '\uf8ff'), limit(10));
            const snap = await getDocs(q);
            grid.style.display = 'none'; title.style.display = 'none';
            results.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                results.innerHTML += `<div class="user-card" onclick="location.href='profile.html?uid=${d.id}'" style="display:flex; align-items:center; gap:12px; padding:10px; background:#111; margin-bottom:5px; border-radius:10px; cursor:pointer;">
                    <img src="${u.photoURL || 'logo.png'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <b>${u.username}</b></div>`;
            });
        };
    </script>
</body>
</html>
