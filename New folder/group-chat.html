
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whiterchat Legend | Ultra Group</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #01080b; --glass: rgba(10, 25, 30, 0.96); --border: rgba(0, 255, 136, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: fixed; /* Prevents body scroll when keyboard is open */
            width: 100%;
        }

        /* Header */
        header { padding: 12px 15px; background: var(--glass); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; z-index: 1000; cursor: pointer; }
        header img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
        .group-name-container { flex: 1; }
        .u-status { font-size: 10px; color: var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Chat Area */
        #chat-scroller { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background-color: var(--bg);
            padding-bottom: 80px; /* Space for fixed footer */
        }
        .msg-box { max-width: 80%; display: flex; flex-direction: column; }
        .sent { align-self: flex-start; } 
        .received { align-self: flex-end; }
        .sender-info { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .sender-name { font-size: 11px; color: var(--neon); font-weight: bold; }
        .admin-badge { background: gold; color: black; font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); word-wrap: break-word; }
        .sent .bubble { background: #1a2429; color: white; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .received .bubble { background: linear-gradient(135deg, var(--neon), #00a86b); color: #000; border-bottom-right-radius: 2px; }

        /* Media & Sidebars */
        #media-panel { position: fixed; bottom: 85px; left: 10px; right: 10px; height: 350px; background: var(--glass); border: 1px solid var(--neon); border-radius: 20px; display: none; flex-direction: column; z-index: 2000; backdrop-filter: blur(20px); overflow: hidden; }
        .grid-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; overflow-y: auto; }
        .grid-results img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .reply-preview { display: none; background: rgba(0,255,136,0.1); padding: 8px; border-radius: 10px; border-left: 3px solid var(--neon); margin-bottom: 5px; position: relative; }

        #members-sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: var(--glass); border-left: 1px solid var(--border); transition: 0.4s; z-index: 3000; padding: 20px; }
        #members-sidebar.active { right: 0; }
        .member-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Footer - Optimized for Mobile Typing */
        footer { 
            padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); 
            background: var(--glass); 
            position: fixed; bottom: 0; width: 100%; z-index: 1001; 
            border-top: 1px solid var(--border);
        }
        .in-wrap { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border-radius: 25px; padding: 5px 15px; border: 1px solid var(--border); }
        #inp { flex: 1; background: none; border: none; color: #fff; padding: 12px 0; outline: none; font-size: 16px; }
        .btn-icon { color: var(--neon); font-size: 20px; cursor: pointer; }

        /* Context Menu */
        #context-menu { position: fixed; background: #0d171b; border: 1px solid var(--neon); border-radius: 12px; display: none; z-index: 5000; width: 150px; box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .menu-opt { padding: 12px 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
        .menu-opt:last-child { border: none; }
        .menu-opt:hover { background: var(--neon); color: black; }

        /* Toast Notification (Replaces Alerts) */
        #toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: var(--neon); color: black; padding: 10px 25px; border-radius: 50px; font-weight: bold; z-index: 9999; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }
    </style>
</head>
<body>

<div id="toast">Notice</div>

<div id="members-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>Group Members</h3>
        <i class="fa-solid fa-xmark" style="font-size:24px;" onclick="toggleMembers()"></i>
    </div>
    <div id="members-list"></div>
</div>

<header onclick="toggleMembers()">
    <img id="g-img" src="logo.png">
    <div class="group-name-container">
        <b id="g-name">Loading...</b><br>
        <span class="u-status">Online • Click for details</span>
    </div>
    <i class="fa-solid fa-ellipsis-vertical btn-icon"></i>
</header>

<div id="chat-scroller"></div>

<div id="media-panel">
    <div style="display:flex; padding:10px; border-bottom:1px solid var(--border);">
        <input type="text" id="m-search" placeholder="Search GIFs..." style="flex:1; background:#000; border:1px solid var(--neon); color:#fff; padding:10px; border-radius:10px; outline:none;" oninput="searchGiphy(this.value)">
        <i class="fa-solid fa-times" style="margin-left:10px; line-height:40px; cursor:pointer;" onclick="toggleMedia()"></i>
    </div>
    <div id="media-grid" class="grid-results"></div>
</div>

<footer>
    <div id="reply-box" class="reply-preview">
        <small id="reply-user" style="color:var(--neon); font-weight:bold;">Reply To:</small>
        <div id="reply-text" style="font-size:12px; opacity:0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <i class="fa-solid fa-times" onclick="cancelReply()" style="position:absolute; right:10px; top:5px; cursor:pointer;"></i>
    </div>
    <div class="in-wrap">
        <i class="fa-solid fa-plus btn-icon" onclick="toggleMedia()"></i>
        <input type="text" id="inp" placeholder="Type a message..." oninput="checkInp()" autocomplete="off">
        <i id="mic-btn" class="fa-solid fa-microphone btn-icon" onclick="handleMic()"></i>
        <i id="send-btn" class="fa-solid fa-paper-plane btn-icon" style="display:none;" onclick="sendMsg()"></i>
    </div>
</footer>

<div id="context-menu">
    <div class="menu-opt" onclick="initReply()"><i class="fa-solid fa-reply"></i> Reply</div>
    <div class="menu-opt mine-only" onclick="initEdit()"><i class="fa-solid fa-pen"></i> Edit</div>
    <div class="menu-opt admin-or-mine" style="color:#ff4d4d;" onclick="initDelete()"><i class="fa-solid fa-trash"></i> Delete</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const fbCfg = { apiKey: "AIzaSyBkjn1uIjzvmC4suZdA8bfYNO_fx5Hnj0s", projectId: "comments-5e3b5" };
    const app = initializeApp(fbCfg); const db = getFirestore(app); const auth = getAuth(app);

    const gId = new URLSearchParams(location.search).get("id");
    let myUser = null, groupData = null, activeMsg = null, isEdit = false, replyData = null;

    const showToast = (txt) => {
        const t = document.getElementById("toast"); t.innerText = txt;
        t.style.top = "20px"; setTimeout(() => t.style.top = "-60px", 2500);
    };

    onAuthStateChanged(auth, user => { if(user) { myUser = user; start(); } });

    async function start() {
        onSnapshot(doc(db, "groups", gId), s => {
            groupData = s.data();
            if(!groupData) return;
            document.getElementById("g-name").innerText = groupData.name;
            document.getElementById("g-img").src = groupData.photo || "logo.png";
            loadMembers();
        });

        onSnapshot(query(collection(db, `groups/${gId}/messages`), orderBy("createdAt", "asc")), snap => {
            const box = document.getElementById("chat-scroller"); box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data(); const isMe = m.senderId === myUser.uid;
                const div = document.createElement("div"); div.className = `msg-box ${isMe?'received':'sent'}`;

                let h = `
                    <div class="sender-info">
                        ${!isMe ? `<img src="${m.senderPhoto}" style="width:20px; height:20px; border-radius:50%; object-fit:cover;">` : ''}
                        <span class="sender-name">${m.senderName}</span>
                        ${m.senderId === groupData.adminId ? '<span class="admin-badge">ADMIN</span>' : ''}
                    </div>
                    <div class="bubble" onclick="openMenu(event,'${d.id}','${m.text}',${isMe})">
                        ${m.reply ? `<div style="font-size:10px; opacity:0.6; border-left:2px solid var(--neon); padding-left:5px; margin-bottom:5px;">Replied: ${m.reply.text}</div>` : ''}
                        ${m.type === 'gif' ? `<img src="${m.url}" style="width:100%; border-radius:10px; max-width:200px;">` : m.text}
                    </div>`;
                div.innerHTML = h; box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendMsg = async () => {
        const inp = document.getElementById("inp"); if(!inp.value.trim()) return;
        if(isEdit) { 
            await updateDoc(doc(db, `groups/${gId}/messages`, activeMsg.id), { text: inp.value });
            isEdit = false;
            showToast("Message Updated");
        } else {
            await addDoc(collection(db, `groups/${gId}/messages`), {
                senderId: myUser.uid, senderName: myUser.displayName, senderPhoto: myUser.photoURL || "logo.png",
                text: inp.value, type: 'text', reply: replyData, createdAt: serverTimestamp()
            });
        }
        inp.value = ""; cancelReply(); checkInp();
    };

    window.openMenu = (e, id, text, isMe) => {
        e.preventDefault(); activeMsg = {id, text};
        const menu = document.getElementById("context-menu");
        menu.style.display = "block"; menu.style.top = e.clientY + "px"; menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + "px";
        document.querySelector(".mine-only").style.display = isMe ? "flex" : "none";
        document.querySelector(".admin-or-mine").style.display = (isMe || myUser.uid === groupData.adminId) ? "flex" : "none";
    };

    window.initReply = () => {
        replyData = { text: activeMsg.text };
        document.getElementById("reply-box").style.display = "block";
        document.getElementById("reply-text").innerText = activeMsg.text;
        hideMenu();
    };

    window.initDelete = async () => { 
        await deleteDoc(doc(db, `groups/${gId}/messages`, activeMsg.id)); 
        showToast("Message Deleted");
        hideMenu(); 
    };

    window.initEdit = () => { isEdit = true; document.getElementById("inp").value = activeMsg.text; hideMenu(); checkInp(); document.getElementById("inp").focus(); };
    window.cancelReply = () => { replyData = null; document.getElementById("reply-box").style.display = "none"; };
    window.hideMenu = () => document.getElementById("context-menu").style.display = "none";

    window.searchGiphy = async (q) => {
        const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=bO9MmeUTiAT6mZxTlFs3fW43viwtwo6Y&q=${q || 'trending'}&limit=9`);
        const {data} = await res.json();
        const grid = document.getElementById("media-grid"); grid.innerHTML = "";
        data.forEach(g => {
            const img = document.createElement("img"); img.src = g.images.fixed_height_small.url;
            img.onclick = async () => {
                await addDoc(collection(db, `groups/${gId}/messages`), {
                    senderId: myUser.uid, senderName: myUser.displayName, senderPhoto: myUser.photoURL,
                    type: 'gif', url: g.images.fixed_height.url, createdAt: serverTimestamp()
                });
                toggleMedia();
            };
            grid.appendChild(img);
        });
    };

    async function loadMembers() {
        const list = document.getElementById("members-list"); list.innerHTML = "";
        for(let id of groupData.members) {
            const u = await getDoc(doc(db, "users", id));
            if(u.exists()) {
                const ud = u.data();
                list.innerHTML += `<div class="member-item">
                    <span>${ud.username} ${id === groupData.adminId ? '⭐' : ''}</span>
                    ${myUser.uid === groupData.adminId && id !== myUser.uid ? `<i class="fa-solid fa-user-minus" style="color:#ff4d4d; cursor:pointer;" onclick="kick('${id}')"></i>` : ''}
                </div>`;
            }
        }
    }

    window.toggleMembers = () => document.getElementById("members-sidebar").classList.toggle("active");
    window.toggleMedia = () => { const p = document.getElementById("media-panel"); p.style.display = p.style.display==='flex'?'none':'flex'; if(p.style.display==='flex') searchGiphy('trending'); };
    
    window.checkInp = () => {
        const v = document.getElementById("inp").value;
        document.getElementById("send-btn").style.display = v ? "block" : "none";
        document.getElementById("mic-btn").style.display = v ? "none" : "block";
    };

    window.handleMic = () => showToast("Microphone feature coming soon!");

    document.addEventListener("click", (e) => {
        if(!e.target.closest('.bubble') && !e.target.closest('#context-menu')) hideMenu();
    });

    // Mobile Keyboard Scroll Fix
    document.getElementById("inp").addEventListener("focus", () => {
        setTimeout(() => {
            document.getElementById("chat-scroller").scrollTop = document.getElementById("chat-scroller").scrollHeight;
        }, 300);
    });
</script>
</body>
</html>
