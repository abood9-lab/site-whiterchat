<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whiterchat | Messages</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00ff88; 
            --bg: #01080b; 
            --glass: rgba(15, 30, 35, 0.9); 
            --border: rgba(0, 255, 136, 0.2); 
            --sidebar-width: 280px; 
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* --- Navigation (Instagram Style) --- */
        .nav-container { position: fixed; background: var(--glass); backdrop-filter: blur(20px); border-right: 1px solid var(--border); z-index: 2000; }
        
        @media (max-width: 768px) {
            .nav-container { 
                bottom: 0; left: 0; width: 100%; height: calc(60px + var(--safe-bottom)); 
                border-right: none; border-top: 1px solid #222; background: #000;
                display: flex; justify-content: space-around; align-items: flex-start; 
                padding-top: 10px; border-radius: 0;
            }
            .nav-text, .sidebar-logo { display: none; }
            .nav-item { color: white; font-size: 24px; text-decoration: none; transition: 0.1s; }
            .nav-item.active { color: var(--neon); }
            .nav-item:active { transform: scale(0.9); }
            .main-content { width: 100%; padding: 15px; padding-bottom: 100px; }
        }

        @media (min-width: 769px) {
            .nav-container { left: 0; top: 0; height: 100vh; width: var(--sidebar-width); display: flex; flex-direction: column; padding: 30px 20px; gap: 10px; }
            .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; border-radius: 15px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.3s; }
            .nav-item.active { background: rgba(0, 255, 136, 0.1); color: var(--neon); }
            .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; display: flex; flex-direction: column; align-items: center; }
            .sidebar-logo { font-size: 30px; font-weight: 900; color: var(--neon); margin-bottom: 40px; font-style: italic; }
        }

        /* --- UI Elements --- */
        .notes-container { display: flex; gap: 15px; overflow-x: auto; width: 100%; max-width: 600px; padding: 10px 0 20px; scrollbar-width: none; }
        .notes-container::-webkit-scrollbar { display: none; }
        .note-item { position: relative; min-width: 85px; text-align: center; cursor: pointer; }
        .note-bubble { position: absolute; top: -15px; left: -5px; background: white; color: black; padding: 5px 12px; border-radius: 18px; font-size: 11px; max-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; }
        .note-img { width: 70px; height: 70px; border-radius: 50%; border: 2.3px solid var(--neon); object-fit: cover; background: #111; padding: 2px; }
        .del-note { position: absolute; top: -10px; right: 0; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; z-index: 20; }
        .music-tag { position: absolute; bottom: 25px; left: 0; background: #1DB954; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
        .section-title { width: 100%; max-width: 600px; color: #fff; font-size: 16px; margin: 25px 0 15px; font-weight: bold; border-left: 3px solid var(--neon); padding-left: 10px; }
        
        .chats-list { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 8px; }
        .chat-card { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 18px; cursor: pointer; position: relative; transition: 0.2s; }
        .chat-card:active { background: rgba(255,255,255,0.1); }
        .img-wrapper { position: relative; width: 55px; height: 55px; }
        .chat-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #111; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--bg); }
        .online { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .offline { background: #444; }
        .unread-badge { position: absolute; top: -5px; right: -5px; background: var(--neon); color: black; font-weight: 900; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        /* --- Modals --- */
        .neon-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-card { background: #0a0f12; border: 1px solid var(--border); padding: 25px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; }
        .modal-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 15px; color: white; margin-top: 15px; font-size: 14px; }
        .search-res { max-height: 180px; overflow-y: auto; background: #000; border-radius: 10px; margin-top: 10px; border: 1px solid #1DB95433; text-align: left; }
        .s-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #111; cursor: pointer; }
        .s-item img { width: 40px; height: 40px; border-radius: 6px; }
        .f-picker { max-height: 200px; overflow-y: auto; margin-top: 15px; }
        .f-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 15px; cursor: pointer; }
        .f-row.selected { border: 1px solid var(--neon); background: rgba(0, 255, 136, 0.1); }
    </style>
</head>
<body>
    <nav class="nav-container">
        <div class="sidebar-logo">Whiterchat</div>
        <a class='nav-item' href='/feed'><i class="fa-solid fa-house"></i> <span class="nav-text">Home</span></a>
        <a class='nav-item' href='/search'><i class="fa-solid fa-magnifying-glass"></i> <span class="nav-text">Explore</span></a>
        <a class='nav-item' href='/create-post'><i class="fa-solid fa-square-plus"></i> <span class="nav-text">Create</span></a>
        <a class='nav-item active' href='/messages'><i class="fa-solid fa-paper-plane"></i> <span class="nav-text">Messages</span></a>
        <a class='nav-item' href='/profile'><i class="fa-solid fa-user"></i> <span class="nav-text">Profile</span></a>
    </nav>

    <main class="main-content">
        <div class="notes-container" id="notes-list">
            <div class="note-item" onclick="openNoteCreate()">
                <div class="note-bubble" style="background:var(--neon); font-weight:bold; color: black;">+ Note</div>
                <img src="logo.png" class="note-img" id="my-profile-img">
                <div style="font-size:11px; margin-top:8px; color:#777; font-weight:bold;">Your Note</div>
            </div>
        </div>

        <div class="section-title">
            Groups 
            <button onclick="openGroupCreate()" style="float:right; background:none; border:none; color:var(--neon); cursor:pointer; font-size: 14px;">
                <i class="fa-solid fa-circle-plus"></i> New
            </button>
        </div>
        <div id="groups-list" class="chats-list"></div>

        <div class="section-title">Chats</div>
        <div id="chats-list" class="chats-list"></div>
    </main>

    <div id="modal-create-note" class="neon-modal">
        <div class="modal-card">
            <h4 style="margin-top:0">Create a Note 🎵</h4>
            <textarea id="note-text-in" class="modal-input" placeholder="Share a thought..." maxlength="60" rows="3"></textarea>
            <input type="text" id="music-search-in" class="modal-input" placeholder="🔍 Add a song..." oninput="searchMusicReal(this.value)">
            <div id="music-results" class="search-res"></div>
            <div id="selected-song-info" style="font-size:11px; color:var(--neon); margin-top:10px; font-weight:bold;"></div>
            <button onclick="publishNote()" style="width:100%; padding:14px; border-radius:15px; background:var(--neon); border:none; font-weight:bold; margin-top:20px; cursor:pointer; color:black">Share</button>
            <button onclick="closeModals()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="note-modal" class="neon-modal">
        <div class="modal-card">
            <img id="modal-user-img" src="logo.png" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--neon); object-fit:cover;">
            <h4 id="modal-user-name" style="margin:15px 0 5px;"></h4>
            <p id="modal-note-text" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; color: #ccc; min-height: 50px;"></p>
            <div id="modal-song-badge" style="display:none; color:#1DB954; font-size:12px; margin-bottom:15px;"><i class="fa-solid fa-music"></i> <span id="modal-song-name"></span></div>
            <input type="text" id="note-reply-input" class="modal-input" placeholder="Send a reply...">
            <button onclick="sendNoteReply()" style="margin-top:20px; width:100%; padding:14px; border-radius:15px; background:var(--neon); border:none; font-weight:bold; cursor:pointer; color:black">Send Reply</button>
            <button onclick="closeModals()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Close</button>
        </div>
    </div>

    <div id="modal-create-group" class="neon-modal">
        <div class="modal-card">
            <h4>New Group 👥</h4>
            <input type="text" id="group-name-in" class="modal-input" placeholder="Group name...">
            <div id="friends-picker-list" class="f-picker"></div>
            <button onclick="confirmGroup()" style="width:100%; padding:14px; border-radius:15px; background:var(--neon); border:none; font-weight:bold; margin-top:15px; cursor:pointer; color:black">Create</button>
            <button onclick="closeModals()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <audio id="global-note-player" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, addDoc, deleteDoc, serverTimestamp, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBkjn1uIjzvmC4suZdA8bfYNO_fx5Hnj0s", projectId: "comments-5e3b5" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let activeNoteUser = null, chosenSong = null, selectedFriends = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const uImg = (user.photoURL && user.photoURL !== 'undefined') ? user.photoURL : 'logo.png';
                document.getElementById('my-profile-img').src = uImg;
                loadNotes(); loadGroups(); loadChats();
            } else { location.href = 'login.html'; }
        });

        // --- Music ---
        window.searchMusicReal = async (val) => {
            const resDiv = document.getElementById('music-results');
            if (val.length < 2) { resDiv.innerHTML = ''; return; }
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(val)}&entity=song&limit=5`);
                const data = await response.json();
                resDiv.innerHTML = data.results.map(t => `
                    <div class="s-item" onclick="selectSong('${t.trackName.replace(/'/g,"")}','${t.artistName.replace(/'/g,"")}','${t.artworkUrl60}','${t.previewUrl}')">
                        <img src="${t.artworkUrl60}">
                        <div><b>${t.trackName}</b><br><small>${t.artistName}</small></div>
                    </div>`).join('');
            } catch(e) {}
        };

        window.selectSong = (title, artist, img, url) => {
            chosenSong = { title, artist, img, previewUrl: url };
            document.getElementById('selected-song-info').innerText = `🎵 Added: ${title}`;
            document.getElementById('music-results').innerHTML = '';
        };

        // --- Notes ---
        async function loadNotes() {
            const dayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            onSnapshot(doc(db, "users", auth.currentUser.uid), (uDoc) => {
                const following = uDoc.data()?.following || [];
                const allowed = [...following, auth.currentUser.uid];
                const qNotes = query(collection(db, "notes"), where("createdAt", ">", dayAgo));
                
                onSnapshot(qNotes, (snap) => {
                    const list = document.getElementById('notes-list');
                    const first = list.children[0];
                    list.innerHTML = ''; list.appendChild(first);
                    snap.forEach(d => {
                        const n = d.data();
                        if (allowed.includes(n.userId)) {
                            const isMe = n.userId === auth.currentUser.uid;
                            const sData = n.song ? JSON.stringify(n.song).replace(/"/g, '&quot;') : 'null';
                            const uImg = (n.userPhoto && n.userPhoto !== 'undefined') ? n.userPhoto : 'logo.png';
                            list.innerHTML += `
                                <div class="note-item">
                                    <div class="note-bubble" onclick="openReplyModal('${n.userId}','${n.username}','${n.text}','${uImg}', '${sData}')">${n.text}</div>
                                    ${isMe ? `<button class="del-note" onclick="deleteNote('${d.id}')">×</button>` : ''}
                                    <img src="${uImg}" class="note-img">
                                    ${n.song ? `<div class="music-tag"><i class="fa-solid fa-music"></i></div>` : ''}
                                    <div style="font-size:11px; margin-top:8px; color:#aaa; font-weight:bold;">${n.username.split(' ')[0]}</div>
                                </div>`;
                        }
                    });
                });
            });
        }

        window.publishNote = async () => {
            const txt = document.getElementById('note-text-in').value;
            if(!txt) return;
            const uImg = (auth.currentUser.photoURL && auth.currentUser.photoURL !== 'undefined') ? auth.currentUser.photoURL : 'logo.png';
            await addDoc(collection(db, "notes"), {
                userId: auth.currentUser.uid,
                username: auth.currentUser.displayName || "User",
                userPhoto: uImg,
                text: txt, song: chosenSong || null, createdAt: serverTimestamp()
            });
            closeModals();
        };

        window.deleteNote = async (id) => { if(confirm("Delete note?")) await deleteDoc(doc(db, "notes", id)); };

        // --- Groups ---
        window.openGroupCreate = async () => {
            const snap = await getDocs(collection(db, "users"));
            const list = document.getElementById('friends-picker-list');
            list.innerHTML = ''; selectedFriends = [];
            snap.forEach(d => {
                if(d.id === auth.currentUser.uid) return;
                const div = document.createElement('div');
                div.className = 'f-row';
                div.innerHTML = `<span>${d.data().username}</span> <i class="fa-regular fa-circle-check"></i>`;
                div.onclick = () => {
                    div.classList.toggle('selected');
                    if(selectedFriends.includes(d.id)) selectedFriends = selectedFriends.filter(f => f !== d.id);
                    else selectedFriends.push(d.id);
                };
                list.appendChild(div);
            });
            document.getElementById('modal-create-group').style.display = 'flex';
        };

        window.confirmGroup = async () => {
            const name = document.getElementById('group-name-in').value;
            if(!name || selectedFriends.length === 0) return;
            await addDoc(collection(db, "groups"), { 
                name, members: [...selectedFriends, auth.currentUser.uid], 
                createdAt: serverTimestamp()
            });
            closeModals();
        };

        function loadGroups() {
            onSnapshot(query(collection(db, "groups"), where("members", "array-contains", auth.currentUser.uid)), (snap) => {
                const list = document.getElementById('groups-list'); list.innerHTML = '';                 
                snap.forEach(d => {
                    const g = d.data();
                    list.innerHTML += `
                        <div class="chat-card" onclick="location.href='/group-chat?id=${d.id}'">
                            <div class="img-wrapper">
                                <div class="chat-img" style="background:var(--neon); color:black; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:20px;">
                                    ${g.name[0].toUpperCase()}
                                </div>
                            </div>
                            <div class="chat-info"><b>${g.name}</b><br><small style="color:gray">Tap to chat with group</small></div>
                        </div>`;
                });
            });
        }

        // --- Chats ---
        function loadChats() {
            onSnapshot(doc(db, "users", auth.currentUser.uid), (uDoc) => {
                const following = uDoc.data()?.following || [];
                const list = document.getElementById('chats-list'); list.innerHTML = '';
                if(following.length === 0) { list.innerHTML = '<center style="color:gray; font-size:12px; margin-top:20px;">No active conversations</center>'; return; }
                
                following.forEach(fId => {
                    const chatId = [auth.currentUser.uid, fId].sort().join("_");
                    let chatCard = document.createElement('div');
                    chatCard.id = `chat-${fId}`;
                    list.appendChild(chatCard);

                    onSnapshot(doc(db, "users", fId), (uSnap) => {
                        const u = uSnap.data(); if(!u) return;
                        const isOnline = u.lastSeen && (new Date() - u.lastSeen.toDate() < 120000);
                        const uImg = (u.photoURL && u.photoURL !== 'undefined') ? u.photoURL : 'logo.png';

                        const mQ = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("createdAt", "desc"));
                        onSnapshot(mQ, (mSnap) => {
                            const msgs = mSnap.docs.map(m => m.data());
                            const last = msgs.length > 0 ? msgs[0].text : "Start chatting...";
                            const unread = msgs.filter(m => m.receiverId === auth.currentUser.uid && !m.isRead).length;

                            chatCard.innerHTML = `
                                <div class="chat-card" onclick="location.href='chat.html?id=${fId}'">
                                    <div class="img-wrapper">
                                        <img src="${uImg}" class="chat-img">
                                        <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                                        ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                                    </div>
                                    <div class="chat-info">
                                        <b>${u.username}</b><br>
                                        <small style="color:${unread > 0 ? 'var(--neon)' : '#666'}">${last.substring(0, 35)}</small>
                                    </div>
                                </div>`;
                        });
                    });
                });
            });
        }

        // --- Modals ---
        window.openReplyModal = (uid, name, text, img, sDataStr) => {
            activeNoteUser = { uid, name };
            document.getElementById('modal-user-img').src = img;
            document.getElementById('modal-user-name').innerText = name;
            document.getElementById('modal-note-text').innerText = text;
            const player = document.getElementById('global-note-player');
            const badge = document.getElementById('modal-song-badge');
            player.pause(); player.src = '';
            
            if (sDataStr && sDataStr !== 'null') {
                try {
                    const s = JSON.parse(sDataStr);
                    document.getElementById('modal-song-name').innerText = s.title;
                    badge.style.display = 'block'; player.src = s.previewUrl;
                    setTimeout(() => player.play(), 200);
                } catch(e) {}
            } else { badge.style.display = 'none'; }
            document.getElementById('note-modal').style.display = 'flex';
        };

        window.sendNoteReply = async () => {
            const rep = document.getElementById('note-reply-input').value;
            if(!rep) return;
            const cId = [auth.currentUser.uid, activeNoteUser.uid].sort().join("_");
            await addDoc(collection(db, "messages"), {
                chatId: cId, senderId: auth.currentUser.uid, receiverId: activeNoteUser.uid,
                text: "💬 Reply: " + rep, isRead: false, createdAt: serverTimestamp()
            });
            closeModals();
        };

        window.openNoteCreate = () => document.getElementById('modal-create-note').style.display = 'flex';
        window.closeModals = () => {
            document.querySelectorAll('.neon-modal').forEach(m => m.style.display = 'none');
            const p = document.getElementById('global-note-player'); p.pause();
        };
    </script>
</body>
</html>
