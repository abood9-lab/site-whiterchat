<!DOCTYPE html>
<html id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiterchat | Welcome</title>
    <style>
        :root { --neon: #00ff88; --dark: #020202; }
        body {
            margin: 0; padding: 0; background: var(--dark);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden;
        }

        .board-scene {
            position: relative; width: 90%; max-width: 800px;
            background: #1a2e1a; border: 15px solid #4e342e;
            border-radius: 20px; padding: 60px 40px;
            box-shadow: inset 0 0 100px #000, 0 30px 60px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
        }

        .writing-area {
            position: relative; width: 100%; display: flex;
            align-items: center; justify-content: center; min-height: 120px;
        }

        #welcome-text {
            font-family: 'Comic Sans MS', cursive;
            font-size: clamp(22px, 5vw, 40px);
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap; overflow: hidden;
            width: 0; border-right: 3px solid transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        /* الولد (عبارة عن إيموجي كبير عشان ما تحتاج صورة) */
        .writer {
            position: absolute; font-size: 80px;
            z-index: 10; pointer-events: none;
            display: none; line-height: 1;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        .btn-go {
            margin-top: 40px; background: var(--neon); color: black;
            padding: 15px 40px; border-radius: 50px; text-decoration: none;
            font-weight: 900; opacity: 0; pointer-events: none;
            transition: 0.5s; transform: translateY(20px);
        }
        .btn-go.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body>

<div class="board-scene">
    <div class="writing-area">
        <h1 id="welcome-text"></h1>
        <div id="boy" class="writer">✍️</div> 
    </div>
    <a class='btn-go' href='/feed' id='btn'>GO</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBkjn1uIjzvmC4suZdA8bfYNO_fx5Hnj0s", 
        authDomain: "comments-5e3b5.firebaseapp.com", 
        projectId: "comments-5e3b5", 
        storageBucket: "comments-5e3b5.firebasestorage.app", 
        messagingSenderId: "907122259758", 
        appId: "1:907122259758:web:7819cab50ebd74dd912cbf" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const name = user.displayName ? user.displayName.split(' ')[0] : "Friend";
            const isAr = navigator.language.startsWith('ar');
            const text = isAr ? `أهلاً بك يا ${name}!` : `Welcome, ${name}!`;
            
            document.documentElement.dir = isAr ? "rtl" : "ltr";
            const textEl = document.getElementById('welcome-text');
            const boy = document.getElementById('boy');
            const btn = document.getElementById('btn');

            textEl.innerText = text;
            boy.style.display = 'block';
            btn.innerText = isAr ? "دخول للمنصة" : "ENTER FEED";

            // تحسين 2: أنيميشن ديناميكي حسب طول النص
            textEl.style.animation = `typing 4s steps(${text.length}) forwards`;

            let startTime = null;
            const duration = 4000;

            function moveBoy(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;
                if (progress > 1) progress = 1;

                // تحسين 4: حساب الموضع بدقة تامة
                const textRect = textEl.getBoundingClientRect();
                const currentWidth = progress * textRect.width;

                // تحسين 5: حركة اهتزاز أنعم
                const bounce = Math.sin(timestamp / 80) * 5;

                // تحسين 1: معالجة اتجاه RTL/LTR وتصفير القيم
                if (isAr) {
                    boy.style.left = "auto";
                    boy.style.right = (currentWidth - 40) + "px";
                    boy.style.transform = `scaleX(-1) translateY(${bounce}px)`;
                } else {
                    boy.style.right = "auto";
                    boy.style.left = (currentWidth - 40) + "px";
                    boy.style.transform = `translateY(${bounce}px)`;
                }

                if (progress < 1) {
                    requestAnimationFrame(moveBoy);
                } else {
                    // تحسين 6: إظهار الزر بشكل احترافي
                    btn.classList.add('show');
                    // اختياري: تحويل تلقائي بعد 3 ثواني من ظهور الزر
                    setTimeout(() => { if(window.location.pathname.includes('welcome')) window.location.href = "feed.html"; }, 5000);
                }
            }

            requestAnimationFrame(moveBoy);
        } else {
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
