<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiterchat | View Post</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ff88; --bg: #01080b; --glass: rgba(15, 30, 35, 0.9); --border: rgba(0, 255, 136, 0.2); }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; margin-top: 40px; }
        .back-btn { margin-bottom: 20px; cursor: pointer; color: var(--neon); display: flex; align-items: center; gap: 10px; text-decoration: none; font-size: 15px; }
        .post-card { background: var(--glass); border-radius: 30px; border: 1px solid var(--border); padding: 15px; }
        .image-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; border-radius: 20px; margin: 10px 0; scrollbar-width: none; }
        .image-slider::-webkit-scrollbar { display: none; }
        .post-img { min-width: 100%; aspect-ratio: 1/1; object-fit: cover; scroll-snap-align: start; }
        .caption { font-size: 15px; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>
<div class="container">
    <a class='back-btn' href='/notifications'><i class="fa-solid fa-arrow-left"></i> Back to Notifications</a>
    <div id="post-render">
        <p style="text-align: center; color: #555;">Loading post...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBkjn1uIjzvmC4suZdA8bfYNO_fx5Hnj0s", 
        authDomain: "comments-5e3b5.firebaseapp.com", 
        projectId: "comments-5e3b5", 
        storageBucket: "comments-5e3b5.firebasestorage.app", 
        messagingSenderId: "907122259758", 
        appId: "1:907122259758:web:7819cab50ebd74dd912cbf" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function loadPost() {
        if (!postId) return;
        const snap = await getDoc(doc(db, "posts", postId));

        if (snap.exists()) {
            const p = snap.data();
            const images = Array.isArray(p.images) ? p.images : (p.imageUrl ? [p.imageUrl] : []);
            
            document.getElementById('post-render').innerHTML = `
                <div class="post-card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/40'}" style="width:38px; height:38px; border-radius:50%; border:1px solid var(--neon);">
                        <b>${p.username}</b>
                    </div>
                    <div class="image-slider">
                        ${images.map(img => `<img src="${img}" class="post-img">`).join('')}
                    </div>
                    <div class="caption"><b>${p.username}</b> ${p.caption || ''}</div>
                    <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
                    <p style="color:var(--neon); font-size:12px; text-align:center;">You can interact with this post on the Home page</p>
                </div>`;
        } else {
            document.getElementById('post-render').innerHTML = "<p style='text-align:center;'>Post not found or has been deleted.</p>";
        }
    }

    loadPost();
</script>
</body>
</html>
